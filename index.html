<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
    <title>乐信圣文麻将游戏</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * { margin: 0; padding: 0; touch-action: manipulation; }
        html, body { overflow: hidden; background: #2c3e50; width: 100%; height: 100%; position: fixed; }
        #game-container { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script src="js/levels.js"></script>
    <!-- 必须按顺序加载场景文件 -->
    <script src="js/scenes/home.js"></script>
    <script src="js/scenes/game.js"></script>
    <script src="js/scenes/results.js"></script>
    <script src="js/scenes/levelList.js"></script>
    <script src="js/scenes/editor.js"></script>
    <script src="js/game.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js')
                    .then(registration => console.log('SW registered:', registration))
                    .catch(error => console.log('SW registration failed:', error));
            });
        }
    </script>
</body>
</html>
