<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
    <title>麻将关卡编辑器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #2c3e50;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            font-family: Arial, sans-serif;
            color: #fff;
        }
        h1 {
            font-size: 28px;
            color: #f1c40f;
            margin-bottom: 15px;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
            justify-content: center;
            align-items: center;
        }
        .layer-btns {
            display: flex;
            gap: 5px;
        }
        button {
            padding: 10px 20px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #3498db;
            color: #fff;
            transition: all 0.2s;
        }
        button:hover { transform: scale(1.05); }
        button.active { background: #e74c3c; }
        button.clear { background: #e67e22; }
        button.export { background: #27ae60; }
        button.preview { background: #9b59b6; }
        .level-input {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .level-input input {
            width: 60px;
            padding: 10px;
            font-size: 18px;
            text-align: center;
            border: 2px solid #3498db;
            border-radius: 8px;
            background: #2c3e50;
            color: #fff;
        }
        .level-input span {
            font-size: 16px;
            color: #bdc3c7;
        }
        .grid-container {
            background: #34495e;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        canvas {
            display: block;
            border-radius: 8px;
        }
        .stats {
            margin-top: 15px;
            font-size: 16px;
            color: #bdc3c7;
            text-align: center;
        }
        .legend {
            display: flex;
            gap: 20px;
            margin-top: 10px;
            justify-content: center;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
        }
        .legend-box {
            width: 20px;
            height: 20px;
            border-radius: 4px;
        }
        .legend-box.ming { background: #3498db; border: 2px solid #2980b9; }
        .legend-box.an { background: #1a1a2e; border: 2px solid #444; }
        .legend-box.selected { background: #e74c3c; border: 2px solid #c0392b; }
        .output-area {
            margin-top: 20px;
            width: 100%;
            max-width: 600px;
        }
        .output-area textarea {
            width: 100%;
            height: 200px;
            background: #1a252f;
            color: #ecf0f1;
            border: 2px solid #3498db;
            border-radius: 8px;
            padding: 15px;
            font-size: 14px;
            font-family: 'Courier New', monospace;
            resize: vertical;
        }
        .output-area textarea:focus {
            outline: none;
            border-color: #f1c40f;
        }
        .copy-btn {
            margin-top: 10px;
            width: 100%;
            background: #16a085;
        }
        .instructions {
            margin-top: 15px;
            font-size: 14px;
            color: #95a5a6;
            text-align: center;
            max-width: 500px;
        }
    </style>
</head>
<body>
    <h1>麻将关卡编辑器</h1>

    <div class="controls">
        <div class="layer-btns">
            <button class="active" data-layer="0">Layer 0</button>
            <button data-layer="1">Layer 1</button>
            <button data-layer="2">Layer 2</button>
            <button data-layer="3">Layer 3</button>
        </div>
        <div class="level-input">
            <span>关卡:</span>
            <input type="number" id="levelNum" value="1" min="1" max="20">
        </div>
        <button class="clear" id="clearLayer">清空当前层</button>
        <button class="clear" id="clearAll">清空全部</button>
        <button class="export" id="exportBtn">导出JSON</button>
    </div>

    <div class="grid-container">
        <canvas id="gridCanvas"></canvas>
    </div>

    <div class="stats" id="stats">Layer 0: 0 张牌</div>

    <div class="legend">
        <div class="legend-item">
            <div class="legend-box ming"></div>
            <span>明牌</span>
        </div>
        <div class="legend-item">
            <div class="legend-box an"></div>
            <span>暗扣</span>
        </div>
        <div class="legend-item">
            <div class="legend-box selected"></div>
            <span>选中(点击切换暗扣)</span>
        </div>
    </div>

    <div class="output-area">
        <textarea id="jsonOutput" placeholder="点击【导出JSON】按钮生成关卡配置..."></textarea>
        <button class="copy-btn" id="copyBtn">复制JSON到剪贴板</button>
    </div>

    <div class="instructions">
        点击网格放置牌，再次点击移除牌。<br>
        点击已有牌可切换明牌/暗扣状态。<br>
        导出JSON后发送给开发者即可更新游戏关卡。
    </div>

    <script>
        // 12列 × 14行网格 - 与游戏保持一致
        const COLS = 12;
        const ROWS = 14;
        // 与游戏中的stepX/stepY保持一致
        const STEP_X = 48;  // 横向间距
        const STEP_Y = 68;  // 纵向间距
        const TILE_WIDTH = 54 * 2;   // 牌宽度(放大2倍)
        const TILE_HEIGHT = 79 * 2;  // 牌高度(放大2倍)
        const CELL_SIZE = Math.max(STEP_X, STEP_Y); // 使用最大间距作为单元格大小
        const POINT_RADIUS = 5; // 交点圆点半径

        // 当前编辑状态
        let currentLayer = 0;
        let selectedTile = null; // 当前选中的牌(用于切换暗扣)

        // 关卡数据: { "layer_row_col": { faceDown: boolean } }
        let tiles = {};

        // Canvas设置
        const canvas = document.getElementById('gridCanvas');
        const ctx = canvas.getContext('2d');

        // 预加载牌背图片
        const tileBackImg = new Image();
        tileBackImg.src = 'assets/pixelMajong/00.png';
        const whiteTileImg = new Image();
        whiteTileImg.src = 'assets/pixelMajong/48.png';

        // 计算画布尺寸
        const PADDING = 60;
        canvas.width = (COLS - 1) * STEP_X + TILE_WIDTH + PADDING * 2;
        canvas.height = (ROWS - 1) * STEP_Y + TILE_HEIGHT + PADDING * 2;

        // 检查某位置是否可以放置指定层级的牌
        function canPlace(layer, row, col) {
            const key = `${layer}_${row}_${col}`;

            // 已经有牌了
            if (tiles[key]) return false;

            // Layer 0：检查周围8个点是否有Layer 0的牌
            if (layer === 0) {
                for (let dr = -1; dr <= 1; dr++) {
                    for (let dc = -1; dc <= 1; dc++) {
                        if (dr === 0 && dc === 0) continue;
                        const nr = row + dr;
                        const nc = col + dc;
                        if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) {
                            const neighborKey = `0_${nr}_${nc}`;
                            if (tiles[neighborKey]) return false;
                        }
                    }
                }
            }

            // Layer 1-3：检查底层是否有支撑牌
            if (layer >= 1) {
                const belowKey = `${layer - 1}_${row}_${col}`;
                if (!tiles[belowKey]) return false;
            }

            return true;
        }

        // 检查某位置是否被锁定（周围有邻居牌或被覆盖）
        function isLocked(layer, row, col) {
            const key = `${layer}_${row}_${col}`;
            if (tiles[key]) return false; // 已经有牌才需要判断是否锁定

            // Layer 0：检查左右是否有邻居（左右锁定规则）
            if (layer === 0) {
                const leftKey = `0_${row}_${col - 2}`;
                const rightKey = `0_${row}_${col + 2}`;
                const hasLeft = tiles[leftKey];
                const hasRight = tiles[rightKey];

                // 左右都被夹住
                if (hasLeft && hasRight) {
                    // 检查上下是否被压住
                    for (let dr = -1; dr <= 1; dr++) {
                        for (let dc = -1; dc <= 1; dc++) {
                            if (dr === 0 && dc === 0) continue;
                            const nr = row + dr;
                            const nc = col + dc;
                            const upperKey = `0_${nr}_${nc}`;
                            if (tiles[upperKey] && nr < row) {
                                return true; // 被上面的牌压住
                            }
                        }
                    }
                }
            }

            // 上层是否覆盖此位置
            for (let l = layer + 1; l <= 3; l++) {
                for (let dr = -1; dr <= 1; dr++) {
                    for (let dc = -1; dc <= 1; dc++) {
                        const nr = row + dr;
                        const nc = col + dc;
                        if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) {
                            const upperKey = `${l}_${nr}_${nc}`;
                            if (tiles[upperKey]) return true;
                        }
                    }
                }
            }

            return false;
        }

        // 计算交点坐标（与游戏一致）
        function getPointPos(row, col) {
            return {
                x: PADDING + col * STEP_X,
                y: PADDING + row * STEP_Y
            };
        }

        // 计算牌的位置
        function getTilePos(layer, row, col) {
            const point = getPointPos(row, col);
            const offsetX = layer * 4;
            const offsetY = layer * 4;
            return {
                x: point.x - TILE_WIDTH / 2 + offsetX,
                y: point.y - TILE_HEIGHT / 2 + offsetY
            };
        }

        // 绘制网格
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 绘制背景
            ctx.fillStyle = '#2c3e50';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制交点网格线
            ctx.strokeStyle = '#3d4f5f';
            ctx.lineWidth = 1;
            for (let row = 0; row < ROWS; row++) {
                for (let col = 0; col < COLS; col++) {
                    const point = getPointPos(row, col);
                    // 横线
                    if (col < COLS - 1) {
                        const nextPoint = getPointPos(row, col + 1);
                        ctx.beginPath();
                        ctx.moveTo(point.x, point.y);
                        ctx.lineTo(nextPoint.x, nextPoint.y);
                        ctx.stroke();
                    }
                    // 竖线
                    if (row < ROWS - 1) {
                        const nextPoint = getPointPos(row + 1, col);
                        ctx.beginPath();
                        ctx.moveTo(point.x, point.y);
                        ctx.lineTo(nextPoint.x, nextPoint.y);
                        ctx.stroke();
                    }
                }
            }

            // 绘制交点
            for (let row = 0; row < ROWS; row++) {
                for (let col = 0; col < COLS; col++) {
                    const point = getPointPos(row, col);
                    ctx.beginPath();
                    ctx.arc(point.x, point.y, POINT_RADIUS, 0, Math.PI * 2);
                    ctx.fillStyle = '#5d6d7e';
                    ctx.fill();
                }
            }

            // 绘制各层已放置的牌（从低层到高层）
            for (let layer = 0; layer <= 3; layer++) {
                drawTilesAtLayer(layer);
            }

            // 绘制当前层的高亮和锁定状态
            drawCurrentLayerHighlight();

            // 更新统计
            updateStats();
        }

        // 绘制指定层的牌
        function drawTilesAtLayer(layer) {
            for (let row = 0; row < ROWS; row++) {
                for (let col = 0; col < COLS; col++) {
                    const key = `${layer}_${row}_${col}`;
                    if (tiles[key]) {
                        drawTile(layer, row, col, tiles[key].faceDown, key === selectedTile);
                    }
                }
            }
        }

        // 绘制单张牌
        function drawTile(layer, row, col, faceDown, isSelected) {
            const tilePos = getTilePos(layer, row, col);
            const tileX = tilePos.x;
            const tileY = tilePos.y;

            // 使用实际图片
            const img = faceDown ? tileBackImg : whiteTileImg;

            // 绘制牌图片
            if (img.complete) {
                ctx.drawImage(img, tileX, tileY, TILE_WIDTH, TILE_HEIGHT);
            } else {
                // 图片还没加载完成时用纯色
                ctx.fillStyle = faceDown ? '#1a1a2e' : '#ecf0f1';
                ctx.fillRect(tileX, tileY, TILE_WIDTH, TILE_HEIGHT);
            }

            // 选中高亮边框
            if (isSelected) {
                ctx.strokeStyle = '#e74c3c';
                ctx.lineWidth = 3;
                ctx.strokeRect(tileX, tileY, TILE_WIDTH, TILE_HEIGHT);
            }

            // 层标记(左上角小数字)
            ctx.fillStyle = faceDown ? '#f39c12' : '#7f8c8d';
            ctx.font = 'bold 10px Arial';
            ctx.fillText(`L${layer}`, tileX + 2, tileY + 12);
        }

        // 绘制当前层的高亮和锁定状态
        function drawCurrentLayerHighlight() {
            for (let row = 0; row < ROWS; row++) {
                for (let col = 0; col < COLS; col++) {
                    const point = getPointPos(row, col);
                    const key = `${currentLayer}_${row}_${col}`;

                    if (tiles[key]) {
                        // 已有牌，绘制选中状态
                        if (selectedTile === key) {
                            ctx.beginPath();
                            ctx.arc(point.x, point.y, POINT_RADIUS + 4, 0, Math.PI * 2);
                            ctx.strokeStyle = '#e74c3c';
                            ctx.lineWidth = 2;
                            ctx.stroke();
                        }
                    } else {
                        // 没有牌，检查是否可以放置
                        if (canPlace(currentLayer, row, col)) {
                            // 可以放置 - 蓝色高亮
                            ctx.beginPath();
                            ctx.arc(point.x, point.y, POINT_RADIUS, 0, Math.PI * 2);
                            ctx.fillStyle = '#3498db';
                            ctx.fill();
                        } else {
                            // 不能放置 - 灰色/锁定
                            ctx.beginPath();
                            ctx.arc(point.x, point.y, POINT_RADIUS, 0, Math.PI * 2);
                            ctx.fillStyle = '#7f8c8d';
                            ctx.fill();
                        }
                    }
                }
            }
        }

        // 点击事件处理
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const clickX = (e.clientX - rect.left) * scaleX;
            const clickY = (e.clientY - rect.top) * scaleY;

            // 找到最近的交点
            let nearestRow = -1, nearestCol = -1, nearestDist = Infinity;

            for (let row = 0; row < ROWS; row++) {
                for (let col = 0; col < COLS; col++) {
                    const point = getPointPos(row, col);
                    const dist = Math.sqrt((clickX - point.x) ** 2 + (clickY - point.y) ** 2);
                    if (dist < nearestDist && dist < STEP_X / 2) {
                        nearestDist = dist;
                        nearestRow = row;
                        nearestCol = col;
                    }
                }
            }

            if (nearestRow >= 0 && nearestCol >= 0) {
                const key = `${currentLayer}_${nearestRow}_${nearestCol}`;

                if (tiles[key]) {
                    // 已有牌 - 切换选中状态或暗扣
                    if (selectedTile === key) {
                        // 双击 - 切换暗扣
                        tiles[key].faceDown = !tiles[key].faceDown;
                        selectedTile = null;
                    } else {
                        // 单击选中
                        selectedTile = key;
                    }
                } else {
                    // 没有牌 - 检查是否可以放置
                    if (canPlace(currentLayer, nearestRow, nearestCol)) {
                        tiles[key] = { faceDown: false };
                        selectedTile = null;
                    } else {
                        // 不能放置 - 提示或震动效果
                        alert('此处不能放置牌！\n\nLayer 0: 周围8格已有牌\nLayer 1-3: 底层没有支撑牌');
                    }
                }

                draw();
            }
        });

        // 右键移除牌
        canvas.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const clickX = (e.clientX - rect.left) * scaleX;
            const clickY = (e.clientY - rect.top) * scaleY;

            for (let layer = 3; layer >= 0; layer--) {
                for (let row = 0; row < ROWS; row++) {
                    for (let col = 0; col < COLS; col++) {
                        const key = `${layer}_${row}_${col}`;
                        if (tiles[key]) {
                            const tilePos = getTilePos(layer, row, col);

                            if (clickX >= tilePos.x && clickX <= tilePos.x + TILE_WIDTH &&
                                clickY >= tilePos.y && clickY <= tilePos.y + TILE_HEIGHT) {
                                delete tiles[key];
                                if (selectedTile === key) selectedTile = null;
                                draw();
                                return;
                            }
                        }
                    }
                }
            }
        });

        // Layer按钮
        document.querySelectorAll('.layer-btns button').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.layer-btns button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentLayer = parseInt(btn.dataset.layer);
                selectedTile = null;
                draw();
            });
        });

        // 清空当前层
        document.getElementById('clearLayer').addEventListener('click', () => {
            const keys = Object.keys(tiles).filter(k => k.startsWith(`${currentLayer}_`));
            keys.forEach(k => delete tiles[k]);
            selectedTile = null;
            draw();
        });

        // 清空全部
        document.getElementById('clearAll').addEventListener('click', () => {
            if (confirm('确定要清空所有层的牌吗？')) {
                tiles = {};
                selectedTile = null;
                draw();
            }
        });

        // 导出JSON
        document.getElementById('exportBtn').addEventListener('click', () => {
            const level = document.getElementById('levelNum').value || 1;

            // 构建tiles数组
            const tilesArray = [];
            for (let layer = 0; layer <= 3; layer++) {
                for (let row = 0; row < ROWS; row++) {
                    for (let col = 0; col < COLS; col++) {
                        const key = `${layer}_${row}_${col}`;
                        if (tiles[key]) {
                            tilesArray.push({
                                row: row,
                                col: col,
                                layer: layer,
                                faceDown: tiles[key].faceDown
                            });
                        }
                    }
                }
            }

            // 如果没有牌，提示用户
            if (tilesArray.length === 0) {
                alert('请先放置一些牌！');
                return;
            }

            const config = {
                level: parseInt(level),
                symmetry: "horizontal",
                tiles: tilesArray
            };

            const jsonStr = JSON.stringify(config, null, 2);
            document.getElementById('jsonOutput').value = jsonStr;
        });

        // 复制按钮
        document.getElementById('copyBtn').addEventListener('click', () => {
            const textarea = document.getElementById('jsonOutput');
            if (!textarea.value) {
                alert('请先点击【导出JSON】生成配置！');
                return;
            }
            textarea.select();
            document.execCommand('copy');
            alert('JSON已复制到剪贴板！');
        });

        // 更新统计
        function updateStats() {
            const counts = [0, 0, 0, 0];
            Object.keys(tiles).forEach(key => {
                const layer = parseInt(key.split('_')[0]);
                counts[layer]++;
            });
            const total = counts.reduce((a, b) => a + b, 0);
            document.getElementById('stats').textContent =
                `总计: ${total} | L0: ${counts[0]} | L1: ${counts[1]} | L2: ${counts[2]} | L3: ${counts[3]}`;
        }

        // 初始绘制
        draw();
    </script>
</body>
</html>
